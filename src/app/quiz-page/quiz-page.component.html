<div class="quiz-container">

  <div>
    <app-quiz-timer
    [resetTimerFlag]="resetTimer"
    [stopTimerFlag]="quizFinished"
    (timerFinished)="handleQuizFinished()"
    />
  </div>
  <app-quiz-questions
  (quizFinished)="handleQuizFinished()"
  
  [restartQuiz]="resetQuestions"
  />
  <div>
    @if (quizFinished) {
    <h2>Quiz Finished!</h2>
    <button class="restart-button" (click)="restartQuiz()" >Restart Quiz</button>
    }
  </div>
</div>
